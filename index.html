<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BeeRad LLC</title>
  <style>
    :root { --text:#111; --muted:#666; --bg:#fff; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }
    .container {
      width: min(1000px, 92%);
      margin: 0 auto;
    }
    header {
      border-bottom: 1px solid #eee;
      padding: 14px 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .brand-logo {
      height: 1.9rem;
      width: auto;
      object-fit: contain;
      display: inline-block;
      vertical-align: middle;
    }
    main {
      padding: 48px 0;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    h1 .brand-logo {
      height: 2.6rem;
    }
    p {
      margin: 0;
      color: var(--muted);
      max-width: 65ch;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">
        <img src="/assets/beerad-logo.png" alt="BeeRad logo" class="brand-logo" />
        <span>BeeRad LLC</span>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>
        <img src="/assets/beerad-logo.png" alt="BeeRad logo" class="brand-logo" />
        <span>BeeRad LLC</span>
      </h1>
      <p>Welcome to BeeRad LLC. We build practical solutions with a focus on quality, reliability, and speed.</p>
    </div>
  </main>
</body>
</html>
